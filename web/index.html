<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="SKOGARK — a tiny text adventure.">
    <title>SKOGARK — A Tiny Text Adventure</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=1">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png?v=1">
    <link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=1">
    <link rel="stylesheet" href="style.css?v=19">
</head>
<body>
    <main id="app">
        <section id="menu">
            <h1>SKOGARK</h1>
            <p class="tagline">Tiny text adventures. Where to?</p>
            <div id="scenarioList"></div>
        </section>

        <section id="game" hidden>
            <div id="titlebar">
                <button id="menuButton" type="button">&lsaquo; Menu</button>
                <span id="gameTitle"></span>
                <button id="hintButton" type="button"
                        title="Get a hint for your next step">&#128161; Hint</button>
                <button id="voiceButton" type="button" aria-pressed="true"
                        title="Toggle spoken narration">&#128266; Voice</button>
                <button id="camsButton" type="button" hidden
                        title="Live webcams along the river">&#128247; Cams</button>
            </div>

            <!-- Location artwork in a fixed pane above the transcript, so the
                 commentary scrolls below the image rather than over it. Two
                 layers cross-fade on room change; the arrival card and the
                 fishmonger's stray cat sit on top of the art. -->
            <div id="scene" aria-hidden="true">
                <div class="scene-layer" id="sceneA"></div>
                <div class="scene-layer" id="sceneB"></div>
                <div id="catSprite"></div>
                <div id="locationFlash"></div>
            </div>

            <div id="transcript" role="log" aria-live="polite" aria-label="Game transcript"></div>
            <div id="actionBar" role="group" aria-label="Suggested actions"></div>
            <form id="inputBar" autocomplete="off">
                <span class="prompt" aria-hidden="true">&gt;</span>
                <input id="command" type="text" name="command"
                       placeholder="What do you do?"
                       autocapitalize="none" autocomplete="off" autocorrect="off"
                       spellcheck="false" enterkeyhint="send" aria-label="Enter a command">
                <button type="submit">Go</button>
            </form>

            <!-- Live-webcam overlay (SavannahCams feeds along the river). -->
            <div id="camsOverlay" hidden>
                <div id="camsPanel" class="overlay-panel">
                    <div class="overlay-header">
                        <span class="overlay-title">Live cameras along the river</span>
                        <select id="camsSelect" aria-label="Choose a webcam"></select>
                        <button id="camsClose" type="button" aria-label="Close cameras">&times;</button>
                    </div>
                    <iframe id="camsFrame" title="Live webcam"
                            allow="autoplay; fullscreen" allowfullscreen></iframe>
                    <div class="overlay-status">
                        Live webcams courtesy of
                        <a href="https://www.savannahcams.com/savannah-ga/" target="_blank" rel="noopener">SavannahCams.com</a>.
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="engine.js?v=28"></script>
    <script src="cat-sprite.js?v=14"></script>
    <script src="app.js?v=29"></script>

    <!-- Privacy-friendly visit counting (no cookies): dashboard at
         https://gskoglind.goatcounter.com/ -->
    <script data-goatcounter="https://gskoglind.goatcounter.com/count"
            async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
