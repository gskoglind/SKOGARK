<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="color-scheme" content="dark">
    <meta name="description" content="SKOGARK — a tiny text adventure.">
    <title>SKOGARK — A Tiny Text Adventure</title>
    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
    <!-- Full-bleed location artwork behind the terminal. Two layers cross-fade
         on room change; the scrim keeps the monospaced text legible. -->
    <div id="scene" aria-hidden="true">
        <div class="scene-layer" id="sceneA"></div>
        <div class="scene-layer" id="sceneB"></div>
        <div id="sceneScrim"></div>
    </div>

    <main id="app">
        <section id="menu">
            <h1>SKOGARK</h1>
            <p class="tagline">A tiny text adventure</p>
            <div id="scenarioList"></div>
        </section>

        <section id="game" hidden>
            <div id="titlebar">
                <button id="menuButton" type="button">&lsaquo; Menu</button>
                <span id="gameTitle"></span>
            </div>
            <div id="transcript" role="log" aria-live="polite" aria-label="Game transcript"></div>
            <form id="inputBar" autocomplete="off">
                <span class="prompt" aria-hidden="true">&gt;</span>
                <input id="command" type="text" name="command"
                       placeholder="What do you do?"
                       autocapitalize="none" autocomplete="off" autocorrect="off"
                       spellcheck="false" enterkeyhint="send" aria-label="Enter a command">
                <button type="submit">Go</button>
            </form>

            <!-- Arrival location card (top) and the fishmonger's stray cat. -->
            <div id="locationFlash" aria-hidden="true"></div>
            <div id="catSprite" aria-hidden="true"></div>
        </section>
    </main>

    <script src="engine.js?v=5"></script>
    <script src="cat-sprite.js?v=5"></script>
    <script src="app.js?v=5"></script>
</body>
</html>
